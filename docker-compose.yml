services:
  db:
    image: postgres:15-alpine
    container_name: milktea-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: milktea
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: milktea-redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: ../infra/Dockerfile.server
    container_name: milktea-server
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://user:password@db:5432/milktea
      REDIS_URL: redis:6379

  client:
    build:
      context: ./client
      dockerfile: ../infra/Dockerfile.client
    container_name: milktea-client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
