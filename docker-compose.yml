services:
  db:
    image: postgres:15-alpine
    container_name: milktea-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-milktea}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: milktea-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  server:
    build:
      context: ./server
      dockerfile: ../infra/Dockerfile.server
    container_name: milktea-server
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://user:password@db:5432/milktea?sslmode=disable&search_path=milktea}
      REDIS_URL: ${REDIS_URL:-redis:6379}
      GIN_MODE: ${GIN_MODE:-release}

  client:
    build:
      context: ./client
      dockerfile: ../infra/Dockerfile.client
    container_name: milktea-client
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}

volumes:
  postgres_data:
